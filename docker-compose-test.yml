version: "3.8"

services:
  web:
    container_name: web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    restart: always
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      - api

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  api:
    container_name: api
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://root:example@mongo:27017
      PORT: 8080
    depends_on:
      - mongo
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/db:/app/packages/db
    working_dir: /app/apps/api
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
