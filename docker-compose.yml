version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /home/node/.pnpm-store  # Add PNPM store volume
    environment:
      - /apps/web/.env
    depends_on:
      - mongo
      - api

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.dev
    ports:
      - "8080:8080"
    restart: always
    volumes:
      - .:/app
      - /home/node/.pnpm-store  # Add PNPM store volume
    environment:
      - /apps/api/.env
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data: